[build]
base = "front-end"
command = """
  # Download and setup latest stable Flutter
  git clone https://github.com/flutter/flutter.git -b stable
  export PATH="$PATH:$(pwd)/flutter/bin"
  flutter config --enable-web
  flutter doctor

  # Build the web app
  flutter pub get
  flutter build web --release
  """
publish = "build/web"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200